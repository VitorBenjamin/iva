name: IVA CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    env:
      SKIP_BROWSER_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (base)
        run: pip install -r requirements.txt

      - name: Install dependencies (dev if exists)
        run: |
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee test-output.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-py${{ matrix.python-version }}
          path: test-output.log

  playwright-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SKIP_BROWSER_TESTS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps || true

      - name: Run tests with browser enabled
        run: python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee test-output-playwright.log

      - name: Upload Playwright test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-playwright
          path: test-output-playwright.log
